<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Accueil</title>
</head>
<body>
     <h1>SIMPLE BLACK JACK</h1>
     <a href="./index.html" class="play">Jouer</a>
     <a href="#" id="loginBtn" class="connect">Se connecter</a>

     <!-- POPUP -->
    <div id="popupLogin" class="popup">
        <div class="popup-content">
            <span class="close">&times;</span>
            <h2>Se connecter</h2>

            <form><label for="text">Identifiant :</label>
                <input type="text" required>

                <label for="password">Mot de passe :</label>
                <input type="password" required>

                <button type="submit">Se connecter</button>
            </form>
        </div>
    </div>

    <!-- JS Pour gérer la Pop-up -->
    <script> 
        const modal = document.getElementById("popupLogin");
        const btn = document.getElementById("loginBtn");
        const close = document.querySelector(".close");

        btn.onclick = function() {
            modal.style.display = "block";
        }

        close.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
